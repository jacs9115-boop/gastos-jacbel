<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Gastos JACBEL</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1F4E78" />
<style>
  :root {
    --navy: #1F4E78;
    --navy-dark: #163a58;
    --bg: #F4F6F9;
    --card: #FFFFFF;
    --text: #1B2430;
    --muted: #6B7686;
    --green: #2E7D32;
    --border: #E3E7ED;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #12161C;
      --card: #1B222C;
      --text: #EDEFF2;
      --muted: #9AA4B2;
      --border: #2A323D;
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
  body { padding-bottom: calc(90px + env(safe-area-inset-bottom)); }
  header { position: sticky; top: 0; z-index: 5; background: var(--navy); color: #fff;
    padding: calc(14px + env(safe-area-inset-top)) 18px 14px; display: flex; align-items: center;
    justify-content: space-between; }
  header h1 { font-size: 19px; margin: 0; font-weight: 700; }
  header .total { font-size: 12px; opacity: 0.85; }
  main { padding: 14px; max-width: 560px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 16px; margin-bottom: 12px; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
  .gasto { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .gasto .left { min-width: 0; }
  .gasto .comercio { font-weight: 700; font-size: 15px; }
  .gasto .meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .gasto .desc { font-size: 12.5px; color: var(--muted); margin-top: 3px; font-style: italic; }
  .gasto .valor { font-weight: 700; font-size: 15px; white-space: nowrap; }
  .badge { display: inline-block; font-size: 10.5px; font-weight: 600; padding: 2px 8px;
    border-radius: 100px; background: var(--navy); color: #fff; opacity: 0.85; margin-top: 6px; }
  .foto-link { display: inline-block; font-size: 11.5px; font-weight: 600; color: var(--navy);
    margin-top: 6px; margin-left: 6px; text-decoration: none; }
  .fab { position: fixed; right: 18px; bottom: calc(18px + env(safe-area-inset-bottom));
    width: 60px; height: 60px; border-radius: 50%; background: var(--navy); color: #fff;
    border: none; font-size: 30px; box-shadow: 0 6px 18px rgba(0,0,0,0.25); display: flex;
    align-items: center; justify-content: center; }
  .fab:active { background: var(--navy-dark); }
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none;
    z-index: 20; }
  .sheet-overlay.open { display: block; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--bg);
    border-radius: 20px 20px 0 0; padding: 16px 18px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform 0.25s ease; z-index: 21; max-height: 88vh;
    overflow-y: auto; }
  .sheet.open { transform: translateY(0); }
  .sheet h2 { margin: 4px 0 14px; font-size: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--muted);
    margin-bottom: 6px; }
  textarea, input[type="text"] { width: 100%; border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; font-size: 15px; background: var(--card); color: var(--text); font-family: inherit; }
  textarea { min-height: 70px; resize: vertical; }
  .photo-btn { display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 16px; border-radius: 12px; border: 2px dashed var(--border);
    background: var(--card); color: var(--navy); font-weight: 600; font-size: 15px; }
  .preview { width: 100%; border-radius: 12px; margin-top: 10px; max-height: 220px;
    object-fit: cover; display: none; }
  .btn-primary { width: 100%; padding: 15px; border: none; border-radius: 12px;
    background: var(--navy); color: #fff; font-weight: 700; font-size: 16px; margin-top: 6px; }
  .btn-primary:disabled { opacity: 0.5; }
  .btn-secondary { width: 100%; padding: 13px; border: none; border-radius: 12px;
    background: transparent; color: var(--muted); font-weight: 600; font-size: 14px; margin-top: 8px; }
  .status { text-align: center; font-size: 14px; color: var(--muted); margin-top: 10px; min-height: 20px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>Gastos JACBEL</h1>
  <div class="total" id="totalMes">Cargando...</div>
</header>

<main id="lista">
  <div class="empty">Cargando gastos...</div>
</main>

<button class="fab" id="btnAbrir" aria-label="Agregar gasto">+</button>

<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <h2>Nuevo gasto</h2>
  <form id="form">
    <div class="field">
      <label for="descripcion">¿Qué te gastaste? (puedes usar el micrófono del teclado)</label>
      <textarea id="descripcion" name="descripcion" placeholder="Ej: compré 5 sacos de cemento en la ferretería"></textarea>
    </div>
    <div class="field">
      <label>Foto de la factura</label>
      <label class="photo-btn" id="photoLabel" for="foto">📷 Tomar o elegir foto</label>
      <input type="file" id="foto" name="foto" accept="image/*" capture="environment" style="display:none" required />
      <img class="preview" id="preview" alt="Vista previa de la factura" />
    </div>
    <button type="submit" class="btn-primary" id="btnGuardar">Guardar gasto</button>
    <button type="button" class="btn-secondary" id="btnCancelar">Cancelar</button>
    <div class="status" id="status"></div>
  </form>
</div>

<script>
const API_BASE = "";
const overlay = document.getElementById("overlay");
const sheet = document.getElementById("sheet");
const btnAbrir = document.getElementById("btnAbrir");
const btnCancelar = document.getElementById("btnCancelar");
const fotoInput = document.getElementById("foto");
const preview = document.getElementById("preview");
const form = document.getElementById("form");
const status = document.getElementById("status");
const btnGuardar = document.getElementById("btnGuardar");

function abrirSheet() {
  overlay.classList.add("open");
  sheet.classList.add("open");
}
function cerrarSheet() {
  overlay.classList.remove("open");
  sheet.classList.remove("open");
  form.reset();
  preview.style.display = "none";
  status.textContent = "";
}
btnAbrir.addEventListener("click", abrirSheet);
btnCancelar.addEventListener("click", cerrarSheet);
overlay.addEventListener("click", cerrarSheet);

fotoInput.addEventListener("change", () => {
  const file = fotoInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    preview.src = e.target.result;
    preview.style.display = "block";
  };
  reader.readAsDataURL(file);
});

const fmt = new Intl.NumberFormat("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 });

function renderLista(gastos) {
  const main = document.getElementById("lista");
  if (!gastos.length) {
    main.innerHTML = '<div class="card empty">Todavía no has registrado gastos.<br/>Toca el botón + para agregar el primero.</div>';
    return;
  }
  const totalMes = gastos.reduce((sum, g) => {
    const gFecha = new Date(g.fecha);
    const hoy = new Date();
    if (gFecha.getMonth() === hoy.getMonth() && gFecha.getFullYear() === hoy.getFullYear()) {
      return sum + (g.valor || 0);
    }
    return sum;
  }, 0);
  document.getElementById("totalMes").textContent = "Este mes: " + fmt.format(totalMes);

  main.innerHTML = gastos.map((g) => `
    <div class="card gasto">
      <div class="left">
        <div class="comercio">${g.comercio || "Sin nombre"}</div>
        <div class="meta">${g.fecha || ""} · ${g.categoria || "Otros"}</div>
        ${g.descripcion ? `<div class="desc">"${g.descripcion}"</div>` : ""}
        <span class="badge">${g.estado || "Registrado"}</span>
        ${g.fotoUrl ? `<a class="foto-link" href="${g.fotoUrl}" target="_blank" rel="noopener">📎 Ver factura</a>` : ""}
      </div>
      <div class="valor">${fmt.format(g.valor || 0)}</div>
    </div>
  `).join("");
}

async function cargarGastos() {
  try {
    const res = await fetch(API_BASE + "/api/gastos");
    const data = await res.json();
    renderLista(data);
  } catch (e) {
    document.getElementById("lista").innerHTML = '<div class="card empty">No se pudo cargar la lista. Revisa tu conexión.</div>';
  }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const descripcion = document.getElementById("descripcion").value.trim();
  const file = fotoInput.files[0];
  if (!file) {
    status.textContent = "Adjunta la foto de la factura.";
    return;
  }
  btnGuardar.disabled = true;
  status.innerHTML = '<span class="spinner"></span> Leyendo la factura con IA...';

  const fd = new FormData();
  fd.append("descripcion", descripcion);
  fd.append("foto", file);

  try {
    const res = await fetch(API_BASE + "/api/gastos", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error al guardar");
    status.textContent = "Gasto guardado ✓";
    setTimeout(() => { cerrarSheet(); cargarGastos(); }, 700);
  } catch (err) {
    status.textContent = "Error: " + err.message;
  } finally {
    btnGuardar.disabled = false;
  }
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

cargarGastos();
</script>
</body>
</html>
